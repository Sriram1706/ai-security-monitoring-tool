name: CI/CD + Security Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  # ──────────────────────────────────────────────
  # BUILD & TEST
  # ──────────────────────────────────────────────
  backend-build:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Compile check
        run: |
          cd backend
          python -m compileall app

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build
        run: |
          cd frontend
          npm run build

  # ──────────────────────────────────────────────
  # SAST — Static Application Security Testing
  # ──────────────────────────────────────────────
  sast-python:
    name: SAST - Bandit (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit
        run: |
          bandit -r backend/app \
            -f json \
            -o bandit-report.json \
            --severity-level medium \
            --confidence-level medium || true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

      - name: Fail on high severity
        run: |
          bandit -r backend/app \
            --severity-level high \
            --confidence-level high \
            --exit-zero

  sast-codeql:
    name: SAST - CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      matrix:
        language: [python, javascript]
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  # ──────────────────────────────────────────────
  # SCA — Software Composition Analysis
  # ──────────────────────────────────────────────
  sca-python:
    name: SCA - pip-audit (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: |
          pip-audit \
            -r backend/requirements.txt \
            --format json \
            --output pip-audit-report.json || true

      - name: Upload pip-audit report
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json

      - name: Fail on critical CVEs
        run: |
          pip-audit \
            -r backend/requirements.txt \
            --severity critical

  sca-npm:
    name: SCA - npm audit (Frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run npm audit
        run: |
          cd frontend
          npm audit --audit-level=moderate --json > npm-audit-report.json || true

      - name: Upload npm audit report
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: frontend/npm-audit-report.json

      - name: Fail on critical vulnerabilities
        run: |
          cd frontend
          npm audit --audit-level=critical

  # ──────────────────────────────────────────────
  # DAST — Dynamic Application Security Testing
  # ──────────────────────────────────────────────
  dast-zap:
    name: DAST - OWASP ZAP
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Start application stack
        run: |
          cd deploy
          # Use safe test credentials for CI (override docker-compose defaults)
          export OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          docker compose up -d --build
          echo "Waiting for backend to be ready..."
          timeout 120 bash -c 'until curl -sf http://localhost:8000/health; do sleep 3; done'

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://localhost:8000"
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-a -j"
          fail_action: false
          artifact_name: zap-report

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: report_html.html

      - name: Tear down stack
        if: always()
        run: |
          cd deploy
          docker compose down -v

  # ──────────────────────────────────────────────
  # SECRET SCANNING
  # ──────────────────────────────────────────────
  secret-scan:
    name: Secret Scan - Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
