name: CI/CD + Security Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────
  # BUILD & TEST
  # ──────────────────────────────────────────────
  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      - name: Compile check
        run: |
          cd backend
          python -m compileall app

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      - name: Build
        run: |
          cd frontend
          npm run build

  # ──────────────────────────────────────────────
  # SAST — Static Application Security Testing
  # ──────────────────────────────────────────────
  sast-semgrep:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >
            p/python
            p/javascript
            p/react
            p/docker
            p/owasp-top-ten
            p/secrets
          generateSarif: "1"
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

  sast-codeql:
    name: SAST - CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      matrix:
        language: [python, javascript]
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  # ──────────────────────────────────────────────
  # SCA — Software Composition Analysis
  # ──────────────────────────────────────────────
  sca-snyk:
    name: SCA - Snyk
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install frontend deps
        run: cd frontend && npm ci
      - name: Install backend deps
        run: cd backend && pip install -r requirements.txt

      - name: Snyk - Python
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=backend/requirements.txt --sarif-file-output=snyk-python.sarif

      - name: Snyk - Node
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=frontend/package.json --sarif-file-output=snyk-node.sarif

      - name: Upload Snyk Python SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('snyk-python.sarif') != ''
        with:
          sarif_file: snyk-python.sarif

      - name: Upload Snyk Node SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('snyk-node.sarif') != ''
        with:
          sarif_file: snyk-node.sarif

  sca-trivy:
    name: SCA - Trivy
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Trivy - Filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: "0"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif


  # ──────────────────────────────────────────────
  # IaC — Infrastructure as Code Scanning
  # ──────────────────────────────────────────────
  iac-checkov:
    name: IaC - Checkov
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: dockerfile
          output_format: sarif
          output_file_path: checkov.sarif
          soft_fail: true

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov.sarif

  # ──────────────────────────────────────────────
  # DAST — Dynamic Application Security Testing
  # ──────────────────────────────────────────────
  dast-zap:
    name: DAST - OWASP ZAP
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Start application stack
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "OPENAI_API_KEY=${OPENAI_API_KEY}" > .env
          echo "THREAT_INTEL_ENABLED=false" >> .env
          touch security.db
          cd deploy
          docker compose up -d --build db backend
          echo "Waiting for backend..."
          timeout 120 bash -c 'until curl -sf http://localhost:8000/health; do sleep 5; done' || {
            echo "=== Backend container status ==="
            docker compose ps
            echo "=== Backend logs ==="
            docker compose logs backend
            echo "=== DB logs ==="
            docker compose logs db
            exit 1
          }

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://localhost:8000"
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-a -j"
          fail_action: false
          artifact_name: zap-report

      - name: Tear down stack
        if: always()
        run: cd deploy && docker compose down -v

  # ──────────────────────────────────────────────
  # SECRET SCANNING
  # ──────────────────────────────────────────────
  secret-scan:
    name: Secret Scan - Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────
  # DEPLOY — Build & push to AWS ECS (main only)
  # ──────────────────────────────────────────────
  deploy-ecs:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build, sast-semgrep, sast-codeql, sca-snyk, sca-trivy, iac-checkov, secret-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG:    ${{ github.sha }}
        run: |
          docker build -t "$ECR_REGISTRY/ai-security-backend:$IMAGE_TAG" backend/
          docker push "$ECR_REGISTRY/ai-security-backend:$IMAGE_TAG"

      - name: Build and push frontend image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG:    ${{ github.sha }}
        run: |
          docker build --build-arg NGINX_CONF=nginx.ecs.conf \
            -t "$ECR_REGISTRY/ai-security-frontend:$IMAGE_TAG" frontend/
          docker push "$ECR_REGISTRY/ai-security-frontend:$IMAGE_TAG"

      - name: Fill task definition template
        env:
          ECR_REGISTRY:  ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG:     ${{ github.sha }}
          AWS_REGION:    ${{ secrets.AWS_REGION }}
          DB_PASSWORD:   ${{ secrets.DB_PASSWORD }}
          JWT_SECRET:    ${{ secrets.JWT_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          sed \
            -e "s|REPLACE_ECR_REGISTRY|$ECR_REGISTRY|g" \
            -e "s|REPLACE_IMAGE_TAG|$IMAGE_TAG|g" \
            -e "s|REPLACE_AWS_REGION|$AWS_REGION|g" \
            -e "s|REPLACE_DB_PASSWORD|$DB_PASSWORD|g" \
            -e "s|REPLACE_JWT_SECRET|$JWT_SECRET|g" \
            -e "s|REPLACE_OPENAI_API_KEY|${OPENAI_API_KEY:-}|g" \
            deploy/ecs/task-definition.json > /tmp/task-def.json

      - name: Register ECS task definition
        id: register-task
        run: |
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/task-def.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "arn=$TASK_DEF_ARN" >> "$GITHUB_OUTPUT"

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster ai-security-cluster \
            --service ai-security-service \
            --task-definition "${{ steps.register-task.outputs.arn }}" \
            --force-new-deployment \
            --query 'service.serviceName' --output text

      - name: Wait for deployment to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster ai-security-cluster \
            --services ai-security-service

      - name: Print deployed URL
        run: |
          INSTANCE_IP=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=ecs-ai-security" "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' --output text)
          echo "========================================"
          echo "  Deployed to: http://$INSTANCE_IP"
          echo "========================================"

  # ──────────────────────────────────────────────
  # DASHBOARD — Deploy to GitHub Pages
  # ──────────────────────────────────────────────
  deploy-dashboard:
    name: Deploy Security Dashboard
    runs-on: ubuntu-latest
    needs: [sast-semgrep, sast-codeql, sca-snyk, sca-trivy, iac-checkov, secret-scan]
    if: always() && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      security-events: read
    steps:
      - uses: actions/checkout@v4
      - name: Bake scan alerts into dashboard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import json, urllib.request, os

          token = os.environ['GH_TOKEN']
          repo  = 'Sriram1706/ai-security-monitoring-tool'
          alerts, page = [], 1
          while True:
              url = (f'https://api.github.com/repos/{repo}/code-scanning/alerts'
                     f'?state=open&per_page=100&page={page}')
              req = urllib.request.Request(url, headers={
                  'Authorization': f'Bearer {token}',
                  'Accept': 'application/vnd.github+json',
                  'X-GitHub-Api-Version': '2022-11-28',
              })
              try:
                  with urllib.request.urlopen(req) as r:
                      data = json.loads(r.read())
                  alerts.extend(data)
                  if len(data) < 100:
                      break
                  page += 1
              except Exception as e:
                  print(f'Warning fetching alerts page {page}: {e}')
                  break

          injection = f'<script>window.BAKED_ALERTS={json.dumps(alerts)};</script>'
          with open('security-dashboard.html') as f:
              html = f.read()
          html = html.replace('</head>', injection + '\n</head>', 1)
          os.makedirs('_site', exist_ok=True)
          with open('_site/index.html', 'w') as f:
              f.write(html)
          print(f'Baked {len(alerts)} alerts into dashboard')
          PYEOF
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          commit_message: "Deploy security dashboard [${{ github.sha }}]"
