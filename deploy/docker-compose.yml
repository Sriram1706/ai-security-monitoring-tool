services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ai_sec
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_sec"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build: ../backend
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/ai_sec
      JWT_SECRET: super-secret-change
      ACCESS_TOKEN_MINUTES: 120
      BOOTSTRAP_ADMIN_EMAIL: admin@ai-sec.local
      BOOTSTRAP_ADMIN_PASSWORD: AdminPass123!
      SQLITE_DB_PATH: /app/security.db
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ../security.db:/app/security.db

  frontend:
    build: ../frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.1.5
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  pg_data:
